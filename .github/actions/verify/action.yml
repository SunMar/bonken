# yaml-language-server: $schema=https://json.schemastore.org/github-action.json

name: Verify
description: |
  Check formatting, run static analysis (with fatal infos) and the full
  test suite. Centralized so develop.yml and release.yml use the exact
  same verification steps. Assumes the workspace has already been prepared
  by ./.github/actions/setup-build.

runs:
  using: composite
  steps:
    - name: Check formatting
      shell: bash
      # Fails (exit 1) if any Dart file is not formatted. Run `dart format .`
      # locally to fix. Cheapest check, so it runs first to fail fast.
      run: dart format --output=none --set-exit-if-changed .

    - name: Analyze (fatal on infos)
      shell: bash
      run: flutter analyze --fatal-infos

    - name: Run tests
      shell: bash
      run: flutter test
