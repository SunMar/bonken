# yaml-language-server: $schema=https://json.schemastore.org/github-action.json

# Composite action that performs the steps every Bonken build needs:
#   - install Flutter (version pinned in /.fvmrc at the repo root)
#   - install Android JDK (when `android: true`)
#   - run `flutter pub get`
#   - install rsvg-convert (used by tool/generate_icons.sh; the script
#     itself sandboxes fontconfig to the repo's bundled fonts, so no
#     system font packages are needed)
#   - generate launcher icons
#
# Centralising this here means each workflow only has to declare its
# build-specific steps. The Flutter version lives in /.fvmrc so it stays
# in sync with local fvm setups.
name: Setup Bonken build environment
description: Install Flutter (from .fvmrc), Java, dependencies, and generate launcher icons.

inputs:
  android:
    description: Whether to install the Android JDK (set to "true" for builds that produce APK/AAB).
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup Java (Android only)
      if: ${{ inputs.android == 'true' }}
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version-file: .fvmrc
        channel: stable
        cache: true

    - name: Install dependencies
      shell: bash
      run: flutter pub get

    - name: Install rsvg-convert (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y librsvg2-bin fontconfig

    - name: Install rsvg-convert (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: brew install librsvg2 fontconfig

    - name: Generate launcher icons
      shell: bash
      run: ./tool/generate_icons.sh --ci
