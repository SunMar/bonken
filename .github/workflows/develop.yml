name: Develop

# Builds a side-installable APK from the `develop` branch on every push.
# The APK uses a different applicationId (com.suninet.bonken.develop) and
# a different launcher label, so it coexists on the device with the
# Play Store install and can never be overwritten by it.
#
# Signed with a dedicated develop upload keystore (held in the `develop`
# GitHub environment, separate from the Play Store release keystore in
# `play-store`).  This keeps the production signing key out of every CI
# run on the develop branch while still producing a properly-signed APK
# (debug-signed APKs are increasingly blocked by Android / Play Protect).

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: develop
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: develop
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-build
        with:
          android: 'true'

      - uses: ./.github/actions/verify

      # -----------------------------------------------------------------
      # Decode upload keystore from the `develop` environment secrets.
      # This is a dedicated develop signing key, separate from the Play
      # Store release keystore. Same env-var names as `release.yml` so the
      # composite action is reused unchanged.
      # -----------------------------------------------------------------
      - uses: ./.github/actions/decode-keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      # versionName  = 0.0.0-develop.<run>+<sha>   (informational only)
      # versionCode  = GITHUB_RUN_NUMBER          (monotonic, unique per build)
      # The applicationId differs from the Play build, so versionCode
      # collisions with Play are irrelevant.
      - name: Derive version
        id: version
        run: |
          SHA="${GITHUB_SHA::7}"
          echo "name=0.0.0-develop.${GITHUB_RUN_NUMBER}+${SHA}" >> "$GITHUB_OUTPUT"
          echo "code=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build develop APK
        run: |
          GIT_COMMIT="$(git rev-parse --short HEAD)"
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }} \
            --dart-define=GIT_COMMIT="$GIT_COMMIT" \
            -PappIdSuffix=.develop \
            -PappLabel="Bonken (test versie)"

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             "bonken-develop-${{ steps.version.outputs.name }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: bonken-develop
          path: bonken-develop-*.apk
          retention-days: 14
