name: Develop

# Builds a side-installable APK from the `develop` branch on every push.
# The APK uses a different applicationId (com.suninet.bonken.develop) and
# a different launcher label, so it coexists on the device with the
# Play Store install and can never be overwritten by it.
#
# Signed with the standard debug key (created automatically by the
# Flutter/Android toolchain), so no upload-keystore secrets are needed.

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: develop
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install rsvg-convert
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin fonts-roboto

      - name: Generate launcher icons
        run: ./tool/generate_icons.sh

      - name: Run tests
        run: flutter test

      # versionName  = 0.0.0-develop.<run>+<sha>   (informational only)
      # versionCode  = GITHUB_RUN_NUMBER          (monotonic, unique per build)
      # The applicationId differs from the Play build, so versionCode
      # collisions with Play are irrelevant.
      - name: Derive version
        id: version
        run: |
          SHA="${GITHUB_SHA::7}"
          echo "name=0.0.0-develop.${GITHUB_RUN_NUMBER}+${SHA}" >> "$GITHUB_OUTPUT"
          echo "code=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build develop APK
        run: |
          GIT_COMMIT="$(git rev-parse --short HEAD)"
          flutter build apk --release \
            --no-tree-shake-icons \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }} \
            --dart-define=GIT_COMMIT="$GIT_COMMIT" \
            -PappIdSuffix=.develop \
            -PappLabel="Bonken (develop)"

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             "bonken-develop-${{ steps.version.outputs.name }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: bonken-develop
          path: bonken-develop-*.apk
          retention-days: 14
