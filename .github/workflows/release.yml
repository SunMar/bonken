name: Release

# Triggers on any tag matching MAJOR.MINOR.PATCH  (e.g. 1.0.0, 1.2.3).
# Run locally with:  git tag 1.0.0 && git push --tags
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # needed to create the GitHub Release
  security-events: write

jobs:
  # =====================================================================
  # Universal gate: verify (format → analyze → dart fix → test → OSV scan)
  # and derive the release version. Every release job below `needs` this,
  # so nothing ships unless verify passes. Builds nothing itself (the web +
  # APK live with the GitHub Release that needs them) and needs no keystore
  # or platform SDK — just Flutter — so it stays fast and platform-agnostic.
  # =====================================================================
  build:
    runs-on: ubuntu-24.04
    outputs:
      name: ${{ steps.version.outputs.name }}
      code: ${{ steps.version.outputs.code }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-build

      - uses: ./.github/actions/verify

      # -----------------------------------------------------------------
      # Derive version info from the git tag.
      #   Tag must look like  MAJOR.MINOR.PATCH  (e.g. 1.2.3)
      #   versionName  ← the tag itself
      #   versionCode  ← GITHUB_RUN_NUMBER  (monotonic, never repeats)
      # -----------------------------------------------------------------
      - name: Derive version
        id: version
        run: |
          NAME="$GITHUB_REF_NAME"
          if [[ ! "$NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$NAME' is not in the form MAJOR.MINOR.PATCH"
            exit 1
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"

  # =====================================================================
  # Publish to Google Play: build the signed AAB (the Play Store format —
  # the APK is NOT used here; it lives with the GitHub Release) and upload
  # it via fastlane supply to the closed-testing "alpha" track as a draft,
  # so promoting to testers stays a manual click in the Play Console.
  #
  # The WHOLE job is gated on the `ANDROID_RELEASE_ENABLED` repo variable
  # and runs in the `play-store` environment (upload keystore + service
  # account, exposed only here and only after any environment protection
  # rules pass). Leave the variable unset for the very first release (build
  # the AAB locally and upload it once through the Play Console UI); flip it
  # to 'true' (Settings → Variables) once PLAY_SERVICE_ACCOUNT_JSON exists.
  # The GitHub Release is a separate job, so it ships regardless.
  # =====================================================================
  release-android:
    needs: build
    if: ${{ vars.ANDROID_RELEASE_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    environment: play-store
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-build
        with:
          android: 'true'

      - uses: ./.github/actions/decode-keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Build Android App Bundle (AAB)
        run: |
          flutter build appbundle --release \
            --build-name=${{ needs.build.outputs.name }} \
            --build-number=${{ needs.build.outputs.code }}

      - name: Rename AAB
        run: |
          mv build/app/outputs/bundle/release/app-release.aab \
             "bonken-${{ github.ref_name }}.aab"

      - name: Upload AAB as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: bonken-${{ github.ref_name }}-aab
          path: bonken-${{ github.ref_name }}.aab
          retention-days: 90

      - name: Setup Ruby (fastlane)
        uses: ruby/setup-ruby@v1
        with:
          working-directory: android
          bundler-cache: true

      - name: Publish to Play Console (alpha, draft)
        working-directory: android
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          AAB_PATH: ../bonken-${{ github.ref_name }}.aab
        run: bundle exec fastlane alpha

  # =====================================================================
  # Create the public GitHub Release with the web (PWA) zip + the signed
  # APK (direct-download / sideload artifact — not a Play Store format).
  # The APK is signed with the upload keystore, which is scoped to the
  # `play-store` environment, so this job runs there too. It does NOT
  # depend on release-android, so a Play upload failure (or a disabled Play
  # release) never blocks the GitHub Release.
  # =====================================================================
  release-github:
    needs: build
    runs-on: ubuntu-24.04
    environment: play-store
    permissions:
      contents: write   # needed to create the GitHub Release
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-build
        with:
          android: 'true'

      - uses: ./.github/actions/decode-keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Build web (PWA)
        run: |
          flutter build web --release \
            --build-name=${{ needs.build.outputs.name }} \
            --build-number=${{ needs.build.outputs.code }}

      - name: Zip web build
        run: |
          cd build/web
          zip -r "../../bonken-web-${{ github.ref_name }}.zip" .

      - name: Build Android APK
        run: |
          flutter build apk --release \
            --build-name=${{ needs.build.outputs.name }} \
            --build-number=${{ needs.build.outputs.code }}

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             "bonken-${{ github.ref_name }}.apk"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --repo "${{ github.repository }}" \
            "bonken-web-${{ github.ref_name }}.zip" \
            "bonken-${{ github.ref_name }}.apk"
