name: Release

# Triggers on any tag matching MAJOR.MINOR.PATCH  (e.g. 1.0.0, 1.2.3).
# Run locally with:  git tag 1.0.0 && git push --tags
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # needed to create the GitHub Release
  security-events: write

# Serialize releases: never run two store uploads at once. Unlike develop
# (which cancels superseded builds), a release in flight must finish — cancelling
# mid-upload could leave a half-published store draft — so queue instead.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # =====================================================================
  # Universal gate: verify (format → analyze → dart fix → test → OSV scan)
  # and derive the release version. Every release job below `needs` this,
  # so nothing ships unless verify passes. Builds nothing itself (the web +
  # APK live with the GitHub Release that needs them) and needs no keystore
  # or platform SDK — just Flutter — so it stays fast and platform-agnostic.
  # =====================================================================
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      name: ${{ steps.version.outputs.name }}
      code: ${{ steps.version.outputs.code }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-build

      - uses: ./.github/actions/verify

      # -----------------------------------------------------------------
      # Derive version info from the git tag.
      #   Tag must look like  MAJOR.MINOR.PATCH  (e.g. 1.2.3)
      #   versionName  ← the tag itself
      #   versionCode  ← GITHUB_RUN_NUMBER  (monotonic, never repeats)
      # -----------------------------------------------------------------
      - name: Derive version
        id: version
        run: |
          NAME="$GITHUB_REF_NAME"
          if [[ ! "$NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$NAME' is not in the form MAJOR.MINOR.PATCH"
            exit 1
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"

  # =====================================================================
  # Publish to Google Play: build the signed AAB (the Play Store format —
  # the APK is NOT used here; it lives with the GitHub Release) and upload
  # it via fastlane supply to the closed-testing "alpha" track as a draft,
  # so promoting to testers stays a manual click in the Play Console.
  #
  # The WHOLE job is gated on the `ANDROID_RELEASE_ENABLED` repo variable
  # and runs in the `play-store` environment (upload keystore + service
  # account, exposed only here and only after any environment protection
  # rules pass). Leave the variable unset for the very first release (build
  # the AAB locally and upload it once through the Play Console UI); flip it
  # to 'true' (Settings → Variables) once PLAY_SERVICE_ACCOUNT_JSON exists.
  # The GitHub Release is a separate job, so it ships regardless.
  # =====================================================================
  release-android:
    needs: verify
    if: ${{ vars.ANDROID_RELEASE_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment: play-store
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-build
        with:
          android: 'true'

      - uses: ./.github/actions/decode-keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Build legacy AAB (com.suninet.bonken)
        run: |
          flutter build appbundle --flavor legacy --release \
            --build-name=${{ needs.verify.outputs.name }} \
            --build-number=${{ needs.verify.outputs.code }}

      - name: Rename legacy AAB
        run: |
          mv build/app/outputs/bundle/legacyRelease/app-legacy-release.aab \
             "bonken-legacy-${{ github.ref_name }}.aab"

      - name: Build current AAB (org.suninet.bonken)
        run: |
          flutter build appbundle --flavor current --release \
            --build-name=${{ needs.verify.outputs.name }} \
            --build-number=${{ needs.verify.outputs.code }}

      - name: Rename current AAB
        run: |
          mv build/app/outputs/bundle/currentRelease/app-current-release.aab \
             "bonken-${{ github.ref_name }}.aab"

      - name: Upload AABs as workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bonken-${{ github.ref_name }}-aab
          path: |
            bonken-legacy-${{ github.ref_name }}.aab
            bonken-${{ github.ref_name }}.aab
          retention-days: 90

      - name: Setup Ruby (fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          working-directory: android
          bundler-cache: true

      - name: Publish legacy to Play Console (alpha, draft)
        working-directory: android
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          AAB_PATH: ../bonken-legacy-${{ github.ref_name }}.aab
          PACKAGE_NAME: com.suninet.bonken
        run: bundle exec fastlane alpha

      - name: Publish current to Play Console (alpha, draft)
        working-directory: android
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          AAB_PATH: ../bonken-${{ github.ref_name }}.aab
          PACKAGE_NAME: org.suninet.bonken
        run: bundle exec fastlane alpha

  # =====================================================================
  # Build the signed iOS IPA and upload it to TestFlight.
  # Runs on macOS (required for Xcode) in the `apple-app-store` environment, so
  # the signing secrets are only exposed here and only after any
  # environment protection rules pass.
  # Code signing uses fastlane match (certs in a separate private repo).
  # The WHOLE job is gated on the `IOS_RELEASE_ENABLED` repo variable, so
  # before the Apple-side setup is done it is skipped entirely (no macOS
  # runner is spun up) while the Android/web release keep working. Nothing
  # depends on this job, so skipping it is free. Flip the variable to
  # 'true' (Settings → Variables) once the `apple-app-store` secrets exist.
  # =====================================================================
  release-ios:
    needs: verify
    if: ${{ vars.IOS_RELEASE_ENABLED == 'true' }}
    runs-on: macos-26
    timeout-minutes: 60
    environment: apple-app-store
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-build

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          working-directory: ios
          bundler-cache: true

      - name: Build & upload to TestFlight
        working-directory: ios
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          BUILD_NAME: ${{ needs.verify.outputs.name }}
          BUILD_NUMBER: ${{ needs.verify.outputs.code }}
        run: bundle exec fastlane release

  # =====================================================================
  # Create the public GitHub Release with the web (PWA) zip + the signed
  # APK (direct-download / sideload artifact — not a Play Store format).
  # The APK is signed with the upload keystore, which is scoped to the
  # `play-store` environment, so this job runs there too. It does NOT
  # depend on release-android, so a Play upload failure (or a disabled Play
  # release) never blocks the GitHub Release.
  # =====================================================================
  release-github:
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: play-store
    permissions:
      contents: write   # needed to create the GitHub Release
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-build
        with:
          android: 'true'

      - uses: ./.github/actions/decode-keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Build web (PWA)
        run: |
          flutter build web --release \
            --build-name=${{ needs.verify.outputs.name }} \
            --build-number=${{ needs.verify.outputs.code }}

      - name: Zip web build
        run: |
          cd build/web
          zip -r "../../bonken-web-${{ github.ref_name }}.zip" .

      - name: Build Android APK (current flavor)
        run: |
          flutter build apk --flavor current --release \
            --build-name=${{ needs.verify.outputs.name }} \
            --build-number=${{ needs.verify.outputs.code }}

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-current-release.apk \
             "bonken-${{ github.ref_name }}.apk"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --repo "${{ github.repository }}" \
            "bonken-web-${{ github.ref_name }}.zip" \
            "bonken-${{ github.ref_name }}.apk"
