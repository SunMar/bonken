# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    # Forbid implicit downcasts from `dynamic` (and other looser types):
    # every cast must be explicit. Catches the JSON-parsing class of bug
    # where a missing `as int` silently lets a String through until runtime.
    strict-casts: true
    # Forbid types being inferred as `dynamic`. Forces an explicit type
    # annotation (or a type the inferencer can pin down) at the point a
    # value enters typed code.
    strict-inference: true
    # Forbid bare generic types like `List` or `Map` — must be `List<T>` /
    # `Map<K, V>`. Stops `dynamic` from leaking in via collection literals.
    strict-raw-types: true

linter:
  # The lint rules applied to this project can be customized in the
  # section below to disable rules from the `package:flutter_lints/flutter.yaml`
  # included above or to enable additional rules. A list of all available lints
  # and their documentation is published at https://dart.dev/lints.
  #
  # Instead of disabling a lint rule for the entire project in the
  # section below, it can also be suppressed for a single line of code
  # or a specific dart file by using the `// ignore: name_of_lint` and
  # `// ignore_for_file: name_of_lint` syntax on the line or in the file
  # producing the lint.
  rules:
    # Flag `await`-able expressions whose result isn't awaited or explicitly
    # discarded with `unawaited(...)`. Prevents accidental fire-and-forget
    # async calls.
    unawaited_futures: true
    # Require trailing commas on multi-element argument/parameter lists so
    # `dart format` produces stable, one-arg-per-line output instead of
    # cascading reflows when a single argument is added or removed.
    require_trailing_commas: true
    # Forbid method/getter calls on `dynamic` values. Pairs with
    # strict-casts/strict-inference: those keep `dynamic` from spreading
    # in the first place; this stops it being silently used once present.
    avoid_dynamic_calls: true
    # Require an explicit return type on every method/function. Defends
    # against accidental `dynamic` returns when the inferencer can't pin a
    # type down (especially on async methods).
    always_declare_return_types: true
    # Forbid `Type.toString()` (e.g. `widget.runtimeType.toString()`) since
    # the result is altered by minification / `dart compile`. Use a
    # discriminator field instead.
    avoid_type_to_string: true

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
