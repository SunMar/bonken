<svg xmlns="http://www.w3.org/2000/svg" viewBox="-128 -128 1280 1280">
  <!-- Padded icon — shared source for Android legacy launcher (< API 26
       and any launcher that clips to a circle) and PWA maskable icons.
       Identical card geometry to icon_bonken.svg, inside a larger viewBox
       so the card sits at ~64 % of the canvas (640/1280 SVG units).
       Card corners (rounded rect, rx=64) are at ~495 SVG units from centre;
       PWA maskable safe-zone radius = 40 % × 1280 = 512 units → ~17 SVG
       units (~7 px on the 512 px icon) inside the boundary.  The native
       adaptive icon's android:inset="10 %" puts corners ~8–10 px inside
       its 36 dp safe zone.  The gradient extends to every edge so
       strict-circle masks don't show a gap.  If the inset or card geometry
       changes, recalculate both margins (see ARCHITECTURE.md §12). -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#283593"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F3F8"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="-128" y="-128" width="1280" height="1280" fill="url(#bg)"/>

  <!-- ===== shared card + suit geometry (keep in sync across icon_bonken*.svg) ===== -->
  <g filter="url(#cardShadow)">
    <rect x="192" y="102" width="640" height="820" rx="64" ry="64" fill="url(#card)"/>
    <rect x="192" y="102" width="640" height="820" rx="64" ry="64"
          fill="none" stroke="#1A237E" stroke-opacity="0.10" stroke-width="4"/>
  </g>
  <!-- Suit symbols rendered as <text> using Arimo
       (bundled at assets/google_fonts/<version>/Arimo-Regular.ttf, exposed to
       rsvg-convert via the bundled fontconfig in
       tool/generate_icons.sh).  Browser previews need
       Arimo installed (an Arial-metric font);
       PNG generation is deterministic regardless. -->
  <g font-family="Arimo" text-anchor="middle" font-size="165">
    <text x="290" y="270" fill="#0D2B4E">&#x2660;</text>
    <text x="425" y="270" fill="#B52424">&#x2665;</text>
  </g>
  <g font-family="Arimo" text-anchor="middle" font-size="165">
    <text x="599" y="855" fill="#CC6600">&#x2666;</text>
    <text x="734" y="855" fill="#3A3A3A">&#x2663;</text>
  </g>
  <g transform="rotate(-52 512 512)"
     font-family="Roboto"
     font-weight="700" font-size="215" text-anchor="middle">
    <text x="512" y="582">
      <tspan fill="#1A237E">Bonken</tspan>
    </text>
  </g>
  <!-- ===== /shared card + suit geometry ===== -->
</svg>
