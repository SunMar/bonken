<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500">
  <defs>
    <radialGradient id="bg" cx="30%" cy="50%" r="90%">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#283593"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F3F8"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- ============================================================== -->
  <!-- Left side: scaled-down icon (the marketing icon design)         -->
  <!-- Icon canvas is 1024x1024.  Place it at 50,50 scaled to 400x400. -->
  <!-- ============================================================== -->
  <g transform="translate(50,50) scale(0.390625)">
    <!-- ===== shared card + suit geometry (keep in sync across icon_bonken*.svg) ===== -->
    <g filter="url(#cardShadow)">
      <rect x="192" y="102" width="640" height="820" rx="64" ry="64" fill="url(#card)"/>
      <rect x="192" y="102" width="640" height="820" rx="64" ry="64"
            fill="none" stroke="#1A237E" stroke-opacity="0.10" stroke-width="4"/>
    </g>
    <!-- Suit symbols rendered as <text> using DejaVu Sans
         (vendored at assets/dejavu/<version>/DejaVuSans.ttf, exposed to
         rsvg-convert via the bundled fontconfig in
         tool/generate_icons.sh).  Browser previews need
         DejaVu Sans installed (default on most Linux);
         PNG generation is deterministic regardless. -->
    <g font-family="DejaVu Sans" text-anchor="middle" font-size="135">
      <text x="290" y="270" fill="#0D2B4E">&#x2660;</text>
      <text x="425" y="270" fill="#B52424">&#x2665;</text>
    </g>
    <g font-family="DejaVu Sans" text-anchor="middle" font-size="135">
      <text x="599" y="855" fill="#CC6600">&#x2666;</text>
      <text x="734" y="855" fill="#3A3A3A">&#x2663;</text>
    </g>
    <g transform="rotate(-52 512 512)"
       font-family="Roboto"
       font-weight="700" font-size="215" text-anchor="middle">
      <text x="512" y="582">
        <tspan fill="#1A237E">Bonken</tspan>
      </text>
    </g>
    <!-- ===== /shared card + suit geometry ===== -->
  </g>

  <!-- ============================================================== -->
  <!-- Right side: short description                                   -->
  <!-- ============================================================== -->
  <g font-family="Roboto"
     font-weight="500" text-anchor="start" font-size="46" fill="#FFFFFF">
    <text x="490" y="175">Een app voor het</text>
    <text x="490" y="235">bijhouden van</text>
    <text x="490" y="295">scores bij het</text>
    <text x="490" y="355">kaartspel Bonken.</text>
  </g>
</svg>
