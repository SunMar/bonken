<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500">
  <defs>
    <radialGradient id="bg" cx="30%" cy="50%" r="90%">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#283593"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F3F8"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- ============================================================== -->
  <!-- Left side: scaled-down icon (the marketing icon design)         -->
  <!-- Icon canvas is 1024x1024.  Place it at 50,50 scaled to 400x400. -->
  <!-- ============================================================== -->
  <g transform="translate(50,50) scale(0.390625)">
    <g filter="url(#cardShadow)">
      <rect x="192" y="102" width="640" height="820" rx="64" ry="64" fill="url(#card)"/>
      <rect x="192" y="102" width="640" height="820" rx="64" ry="64"
            fill="none" stroke="#1A237E" stroke-opacity="0.10" stroke-width="4"/>
    </g>
    <g font-family="Roboto, 'Helvetica Neue', Arial, sans-serif" text-anchor="middle" font-size="135">
      <text x="290" y="270" fill="#0D2B4E">♠</text>
      <text x="425" y="270" fill="#B52424">♥</text>
    </g>
    <g font-family="Roboto, 'Helvetica Neue', Arial, sans-serif" text-anchor="middle" font-size="135">
      <text x="599" y="855" fill="#CC6600">♦</text>
      <text x="734" y="855" fill="#3A3A3A">♣</text>
    </g>
    <g transform="rotate(-52 512 512)"
       font-family="'Roboto Black', Roboto, 'Helvetica Neue', Arial, sans-serif"
       font-weight="900" font-size="215" text-anchor="middle">
      <text x="512" y="582">
        <tspan fill="#0D2B4E">B</tspan><tspan fill="#B52424">o</tspan><tspan fill="#CC6600">n</tspan><tspan fill="#3A3A3A">k</tspan><tspan fill="#0D2B4E">e</tspan><tspan fill="#B52424">n</tspan>
      </text>
    </g>
  </g>

  <!-- ============================================================== -->
  <!-- Right side: wordmark + tagline                                  -->
  <!-- ============================================================== -->
  <g font-family="'Roboto Black', Roboto, 'Helvetica Neue', Arial, sans-serif"
     font-weight="900" text-anchor="start">
    <text x="500" y="240" font-size="140" fill="#FFFFFF">Bonken</text>
  </g>
  <g font-family="Roboto, 'Helvetica Neue', Arial, sans-serif"
     font-weight="400" text-anchor="start">
    <text x="502" y="300" font-size="44" fill="#FFFFFF" fill-opacity="0.92">Scorekaart</text>
  </g>

  <!-- Tagline suits: small accent strip beneath, in the suit palette. -->
  <g font-family="Roboto, 'Helvetica Neue', Arial, sans-serif"
     text-anchor="start" font-size="72">
    <text x="502" y="400" fill="#0D2B4E">♠</text>
    <text x="582" y="400" fill="#B52424">♥</text>
    <text x="662" y="400" fill="#CC6600">♦</text>
    <text x="742" y="400" fill="#3A3A3A">♣</text>
  </g>
</svg>
