<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#283593"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F3F8"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Card: 640 x 820, centered. Fills more of the canvas than the
       adaptive variant — fine here because Play Store / web favicon don't
       crop the image. -->
  <g filter="url(#cardShadow)">
    <rect x="192" y="102" width="640" height="820" rx="64" ry="64" fill="url(#card)"/>
    <rect x="192" y="102" width="640" height="820" rx="64" ry="64"
          fill="none" stroke="#1A237E" stroke-opacity="0.10" stroke-width="4"/>
  </g>

  <!-- Top-left corner pair: spade + heart -->
  <g font-family="Roboto, 'Helvetica Neue', Arial, sans-serif" text-anchor="middle" font-size="135">
    <text x="290" y="270" fill="#0D2B4E">♠</text>
    <text x="425" y="270" fill="#B52424">♥</text>
  </g>

  <!-- Bottom-right corner pair: diamond + club -->
  <g font-family="Roboto, 'Helvetica Neue', Arial, sans-serif" text-anchor="middle" font-size="135">
    <text x="599" y="855" fill="#CC6600">♦</text>
    <text x="734" y="855" fill="#3A3A3A">♣</text>
  </g>

  <!-- Diagonal "Bonken" wordmark, larger to match the bigger card. -->
  <g transform="rotate(-52 512 512)"
     font-family="'Roboto Black', Roboto, 'Helvetica Neue', Arial, sans-serif"
     font-weight="900" font-size="215" text-anchor="middle">
    <text x="512" y="582">
      <tspan fill="#0D2B4E">B</tspan><tspan fill="#B52424">o</tspan><tspan fill="#CC6600">n</tspan><tspan fill="#3A3A3A">k</tspan><tspan fill="#0D2B4E">e</tspan><tspan fill="#B52424">n</tspan>
    </text>
  </g>
</svg>
