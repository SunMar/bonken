<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Bonken logo, squircle variant — the rounded-corner app-icon shape, used
       for the About-dialog icon, the share-card icon and the web favicon.
       Identical to icon_bonken.svg except the background rect has rounded
       corners, so the icon reads as a self-contained app icon instead of a
       hard-edged square. Everything outside the rounded rect is transparent.
       Corner radius = 22.37%: a rounded-rect approximation of the iOS app-icon
       squircle (also a fine Android rounded-square mask) — the single corner
       ratio used app-wide. Keep it in sync with the splash icon's
       `border-radius` in web/index.html. (NB: a true iOS icon is a continuous
       superellipse; this circular-arc rounded rect is the common approximation.)
       generate_icons.sh renders it pre-sized (so Flutter never resizes at
       runtime) to icon_bonken_about.png at 48/96/144 px (×1/×2/×3, the 48dp
       dialog icon), icon_bonken_share.png at 72 px (the share-card icon), and
       web/favicon.png at 32 px (the browser-tab favicon).
       The card geometry below MUST stay identical across icon_bonken.svg,
       icon_bonken_flat.svg, icon_bonken_padded.svg, icon_bonken_adaptive_fg.svg
       and this file — only the viewBox, background and corner radius differ. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#283593"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F3F8"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rx/ry = 22.37% (the app-wide corner ratio; matches web/index.html). -->
  <rect x="0" y="0" width="1024" height="1024" rx="22.37%" ry="22.37%" fill="url(#bg)"/>

  <!-- ===== shared card + suit geometry (keep in sync across icon_bonken*.svg) ===== -->
  <g filter="url(#cardShadow)">
    <rect x="192" y="102" width="640" height="820" rx="64" ry="64" fill="url(#card)"/>
    <rect x="192" y="102" width="640" height="820" rx="64" ry="64"
          fill="none" stroke="#1A237E" stroke-opacity="0.10" stroke-width="4"/>
  </g>
  <!-- Suit symbols rendered as <text> using Arimo
       (bundled at assets/google_fonts/<version>/Arimo-Regular.ttf, exposed to
       rsvg-convert via the bundled fontconfig in
       tool/generate_icons.sh).  Browser previews need
       Arimo installed (an Arial-metric font);
       PNG generation is deterministic regardless. -->
  <g font-family="Arimo" text-anchor="middle" font-size="165">
    <text x="290" y="270" fill="#0D2B4E">&#x2660;</text>
    <text x="425" y="270" fill="#B52424">&#x2665;</text>
  </g>
  <g font-family="Arimo" text-anchor="middle" font-size="165">
    <text x="599" y="855" fill="#CC6600">&#x2666;</text>
    <text x="734" y="855" fill="#3A3A3A">&#x2663;</text>
  </g>
  <g transform="rotate(-52 512 512)"
     font-family="Roboto"
     font-weight="700" font-size="215" text-anchor="middle">
    <text x="512" y="582">
      <tspan fill="#1A237E">Bonken</tspan>
    </text>
  </g>
  <!-- ===== /shared card + suit geometry ===== -->
</svg>
