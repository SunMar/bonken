<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Android adaptive icon FOREGROUND.
       Drawn on the same 1024×1024 canvas as the background.
       Android crops to a circle/squircle of ~62% of the canvas.
       Important content stays inside the centered safe-zone circle
       (diameter ≈ 635 px). -->
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F3F8"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card: 460 x 600, centered in canvas. Sits inside the safe zone. -->
  <g filter="url(#cardShadow)">
    <rect x="282" y="212" width="460" height="600" rx="48" ry="48" fill="url(#card)"/>
    <rect x="282" y="212" width="460" height="600" rx="48" ry="48"
          fill="none" stroke="#1A237E" stroke-opacity="0.10" stroke-width="4"/>
  </g>

  <!-- Top-left corner pair: spade + heart (smaller than marketing version
       to leave room for a big centered B). -->
  <g font-family="Roboto, 'Helvetica Neue', Arial, sans-serif" text-anchor="middle" font-size="80">
    <text x="345" y="325" fill="#0D2B4E">♠</text>
    <text x="425" y="325" fill="#B52424">♥</text>
  </g>

  <!-- Bottom-right corner pair: diamond + club -->
  <g font-family="Roboto, 'Helvetica Neue', Arial, sans-serif" text-anchor="middle" font-size="80">
    <text x="599" y="780" fill="#CC6600">♦</text>
    <text x="679" y="780" fill="#3A3A3A">♣</text>
  </g>

  <!-- Big centered B — rotated to match the wordmark angle. -->
  <text x="512" y="655" text-anchor="middle"
        transform="rotate(-52 512 512)"
        font-family="'Roboto Black', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="380" font-weight="900" fill="#0D2B4E">B</text>
</svg>
