org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Keep false: in_app_update 4.2.5 ships its own KGP in its buildscript, which
# conflicts with AGP's builtInKotlin mode (NullPointerException at configure time).
# Re-evaluate when in_app_update (or a replacement) supports builtInKotlin.
android.builtInKotlin=false
# Keep false: Flutter's Gradle plugin (dev.flutter.flutter-gradle-plugin) does not
# yet support AGP 9's new DSL interface — enabling it causes an NPE in plugin apply.
# Re-evaluate when Flutter updates its plugin for AGP 9 new-DSL compatibility.
android.newDsl=false
