name: bonken
description: "Bonken – score calculator for the Dutch card game Bonken."
publish_to: 'none'

# Version is intentionally a sentinel here.  CI passes --build-name and
# --build-number to `flutter build` based on the git tag / run number,
# overriding this default.  The 0.0.0+0 placeholder makes local/dev builds
# obviously distinct from any real release version.
version: 0.0.0+0

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.2

  # Deep-equality helpers (DeepCollectionEquality, listEquals via foundation).
  collection: ^1.19.1

  # Google Fonts — Roboto bundled as local assets in assets/google_fonts/<version>/
  # allowRuntimeFetching is disabled so the app works fully offline.
  # Version is pinned (no caret) so `flutter pub upgrade` won't bump it
  # without also re-downloading the matching font hashes.  To upgrade,
  # run `dart run tool/update_fonts.dart` — it bumps this version, the asset
  # path below, and replaces the bundled .ttf files in one step.
  google_fonts: 8.1.0

  # Play Store in-app update prompts (flexible + immediate update flows).
  in_app_update: ^4.2.5

  # Persistent local storage for settings and game state.
  shared_preferences: ^2.5.5

  # Read app version/build info at runtime (shown in the About dialog).
  package_info_plus: ^10.2.0

  # Open external URLs (the GitHub link in the About dialog).
  url_launcher: ^6.3.2

  # Cross-platform share sheet (Android intent / iOS share / Web Share API).
  share_plus: ^13.2.0

  # Temporary directory for writing share images on mobile.
  path_provider: ^2.1.6

  # UUID generation for stable player identifiers.
  uuid: ^4.5.3

  # File picker for importing backup ZIP files (cross-platform, returns bytes).
  # v12 resolves the win32 ^6 conflict with package_info_plus ^10 that affects
  # v8–11; using the beta as a one-off exception to avoid a win32 override.
  file_picker: '>=12.0.0-0 <13.0.0'

  # Pure-Dart ZIP encoder/decoder for export/import backup archives.
  archive: ^4.0.9

  # SHA-256 hashing for backup file integrity verification.
  crypto: ^3.0.7

  # DOM bindings for the web file-download path (save_service_web.dart), via
  # package:web + dart:js_interop — the modern replacement for dart:html.
  web: ^1.1.1

  # Material Symbols (variable-font icon set) — used app-wide as the
  # canonical icon set in place of Flutter's built-in `Icons`. The
  # built-in set ships an outdated subset, so the codebase never
  # references it directly; every icon in the app is a `Symbols.xxx`
  # from this package.
  material_symbols_icons: ^4.2951.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

  # Used by tool/hct.dart (HCT colour exploration). Available transitively via
  # flutter, but declared explicitly so `missing_dependency` is satisfied and
  # the tool import is traceable to a real direct dependency.
  material_color_utilities: ^0.13.0
  # Used by tool/update_fonts.dart, tool/update_deps.dart, and
  # tool/update_flutter.dart (via tool/helpers/pubspec_yaml.dart) for
  # format-preserving pubspec.yaml reads and edits. Declared explicitly so
  # `missing_dependency` is satisfied and the tool imports are traceable.
  yaml: ^3.1.3
  yaml_edit: ^2.2.4
  # Used by tests to mock the SharedPreferencesAsync backend
  # (InMemorySharedPreferencesAsync + SharedPreferencesAsyncPlatform.instance);
  # available transitively via shared_preferences but declared explicitly so the
  # test import is traceable and `missing_dependency` is satisfied.
  shared_preferences_platform_interface: ^2.4.2

# Launcher icon generation.  Run after changing the source SVG/PNG:
#   dart run flutter_launcher_icons
# This regenerates android/app/src/main/res/mipmap-* assets, the iOS
# AppIcon.appiconset, and the web favicon.
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true # App Store rejects icons with an alpha channel.
  background_color_ios: "#283593" # Flatten transparency onto the brand colour.
  image_path: "assets/icon/icon_bonken_padded.png"
  image_path_ios: "assets/icon/icon_bonken.png"
  min_sdk_android: 21
  adaptive_icon_background: "assets/icon/icon_bonken_adaptive_bg.png"
  adaptive_icon_foreground: "assets/icon/icon_bonken_adaptive_fg.png"
  adaptive_icon_foreground_inset: 10 # corners ~8-10px inside adaptive safe zone (36dp); keep in sync with icon_bonken_adaptive_fg.svg viewBox — see ARCHITECTURE.md §12
  web:
    generate: true
    image_path: "assets/icon/icon_bonken.png"
    background_color: "#283593"
    theme_color: "#5C6BC0"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Roboto (text) + Arimo (the card-suit glyphs ♠ ♥ ♦ ♣) font files for
  # google_fonts <version>. Both are bundled locally and loaded via the
  # google_fonts package with allowRuntimeFetching = false, so the app
  # works fully offline and the icon SVGs in assets/icon/ rasterize
  # deterministically from the same .ttf the runtime app uses. Bundling
  # Arimo also stops Android substituting colored emoji for the suit
  # codepoints. tool/update_fonts.dart keeps these in lock-step with the
  # pinned package version.
  assets:
    - assets/google_fonts/8.1.0/
    - assets/icon/icon_bonken.png
    - assets/icon/icon_bonken_share.png
    # About-dialog app icon: pre-sized to its 48dp display size with a baked-in
    # squircle and 2.0x/3.0x variants (assets/icon/{2.0x,3.0x}/), so it renders
    # 1:1 per devicePixelRatio instead of downscaling the 1024px launcher source.
    - assets/icon/icon_bonken_about.png
    # Official App Store / Google Play badge artwork, shown as store links in
    # the About dialog (web only) — see lib/widgets/app_bar_widgets.dart.
    # Pre-sized to the display height so Flutter never resizes at runtime;
    # the 1x files are listed here and the 2.0x/3.0x resolution variants
    # (assets/store/{2.0x,3.0x}/) are picked up automatically per devicePixelRatio.
    - assets/store/app_store_badge_nl.png
    - assets/store/google_play_badge_nl.png
    # The app's own AGPL-3.0 license, bundled so it resolves at runtime
    # and is aggregated into the build-time NOTICES asset that
    # `showLicensePage()` reads.
    - LICENSE
